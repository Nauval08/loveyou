<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journey to Freedom | Anime Cinematic</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js">
    </script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            overflow-x: hidden;
            background: #000;
            color: white;
            user-select: none;
        }
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }
        #loading-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
            color: white;
            font-size: 1.5rem;
            letter-spacing: 0.2em;
        }
        #loading-bar-container {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            margin-top: 20px;
            border-radius: 2px;
            overflow: hidden;
        }
        #loading-bar {
            width: 0%;
            height: 100%;
            background: #fff;
            border-radius: 2px;
            transition: width 0.3s ease;
        }
        #ui-overlay {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .audio-btn {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: white;
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            letter-spacing: 0.05em;
        }
        .audio-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: white;
        }
        #ending-message {
            position: fixed;
            bottom: 20%;
            width: 100%;
            text-align: center;
            z-index: 8;
            opacity: 0;
            transition: opacity 1.5s ease;
            pointer-events: none;
        }
        #ending-message.show {
            opacity: 1;
            pointer-events: auto;
        }
        #ending-message h1 {
            font-size: clamp(1.8rem, 6vw, 3rem);
            font-weight: 400;
            margin-bottom: 2rem;
            text-shadow: 0 0 40px #000;
        }
        .start-journey-btn {
            background: rgba(255, 215, 0, 0.9);
            border: none;
            color: #1a1a1a;
            padding: 16px 40px;
            font-size: 1.3rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 0.1em;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.6);
            transition: 0.4s;
        }
        .start-journey-btn:hover {
            background: #fff;
            box-shadow: 0 0 60px gold;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="loading-screen">
        <div>JOURNEY TO FREEDOM</div>
        <div id="loading-bar-container"><div id="loading-bar"></div></div>
    </div>
    <div id="ending-message">
        <h1>Every step away from darkness<br>is a step closer to the light.</h1>
        <button class="start-journey-btn" id="restart-btn">Start Your Journey</button>
    </div>
    <div id="ui-overlay">
        <button id="play-music-btn" class="audio-btn">▶ Play Music</button>
        <button id="pause-music-btn" class="audio-btn">⏸️ Pause</button>
        <button id="mute-btn" class="audio-btn">🔊 Mute</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { OutlinePass } from 'three/addons/postprocessing/OutlinePass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
        import { RGBShiftShader } from 'three/addons/shaders/RGBShiftShader.js';

        // ---------- LOADING ----------
        const loadingScreen = document.getElementById('loading-screen');
        const loadingBar = document.getElementById('loading-bar');
        let loadProgress = 0;
        const loadingInterval = setInterval(() => {
            loadProgress += Math.random() * 12;
            if (loadProgress >= 100) {
                loadProgress = 100;
                clearInterval(loadingInterval);
                setTimeout(() => {
                    loadingScreen.style.opacity = '0';
                    setTimeout(() => loadingScreen.style.display = 'none', 800);
                    startJourney();
                }, 400);
            }
            loadingBar.style.width = loadProgress + '%';
        }, 150);

        // ---------- SCENE SETUP ----------
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050510, 0.0002);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3.2, 10);
        camera.lookAt(0, 1.3, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ReinhardToneMapping;
        container.appendChild(renderer.domElement);

        // Post-processing
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.5, 0.4, 0.85);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 0.6;
        const rgbShiftPass = new ShaderPass(RGBShiftShader);
        rgbShiftPass.uniforms['amount'].value = 0.0012;
        const outlinePass = new OutlinePass(new THREE.Vector2(window.innerWidth, window.innerHeight), scene, camera);
        outlinePass.edgeStrength = 4;
        outlinePass.edgeGlow = 0.1;
        outlinePass.edgeThickness = 1.5;
        outlinePass.pulsePeriod = 0;
        outlinePass.usePatternTexture = false;
        outlinePass.visibleEdgeColor.set('#000000');
        outlinePass.hiddenEdgeColor.set('#000000');

        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(outlinePass);
        composer.addPass(bloomPass);
        composer.addPass(rgbShiftPass);
        rgbShiftPass.renderToScreen = true;

        // Lighting
        const ambient = new THREE.AmbientLight(0x404066);
        scene.add(ambient);
        const dirLight = new THREE.DirectionalLight(0xccddff, 0.3);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        scene.add(dirLight);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(60, 60);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.9 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.5;
        ground.receiveShadow = true;
        scene.add(ground);

        // Environment: stones, rain, clouds (sama seperti sebelumnya, disederhanakan)
        const stoneGroup = new THREE.Group();
        for (let i = 0; i < 20; i++) {
            const stone = new THREE.Mesh(new THREE.DodecahedronGeometry(0.2 + Math.random() * 0.4),
                new THREE.MeshStandardMaterial({ color: 0x334455, roughness: 0.8 }));
            stone.position.set((Math.random() - 0.5) * 18, -0.2, (Math.random() - 0.5) * 20);
            stone.castShadow = stone.receiveShadow = true;
            stoneGroup.add(stone);
        }
        scene.add(stoneGroup);

        const rainGeo = new THREE.BufferGeometry();
        const rainCount = 500;
        const rainPositions = new Float32Array(rainCount * 3);
        for (let i = 0; i < rainCount * 3; i += 3) {
            rainPositions[i] = (Math.random() - 0.5) * 25;
            rainPositions[i + 1] = Math.random() * 12;
            rainPositions[i + 2] = (Math.random() - 0.5) * 20;
        }
        rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPositions, 3));
        const rainMat = new THREE.PointsMaterial({ color: 0xaaccff, size: 0.07, transparent: true, opacity: 0.4,
            blending: THREE.AdditiveBlending });
        const rain = new THREE.Points(rainGeo, rainMat);
        scene.add(rain);

        // Sun & rays
        const sun = new THREE.Mesh(new THREE.SphereGeometry(1.0, 32, 32), new THREE.MeshBasicMaterial({ color: 0xffaa33 }));
        sun.position.set(4, 7, -14);
        sun.visible = false;
        scene.add(sun);
        const rayGroup = new THREE.Group();
        const rayCone = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 2.5, 12, 16),
            new THREE.MeshBasicMaterial({ color: 0xffdd99, transparent: true, opacity: 0.06, blending: THREE
                    .AdditiveBlending }));
        rayCone.position.y = 6;
        rayGroup.add(rayCone);
        rayGroup.position.copy(sun.position);
        rayGroup.visible = false;
        scene.add(rayGroup);

        // Birds & flowers (hidden at start)
        const birdGroup = new THREE.Group();
        for (let i = 0; i < 6; i++) {
            const bird = new THREE.Mesh(new THREE.ConeGeometry(0.12, 0.35, 4),
                new THREE.MeshStandardMaterial({ color: 0xffffff }));
            bird.position.set((Math.random() - 0.5) * 5, 4 + Math.random() * 3, -7 + Math.random() * 3);
            birdGroup.add(bird);
        }
        birdGroup.visible = false;
        scene.add(birdGroup);
        const flowerGroup = new THREE.Group();
        for (let i = 0; i < 25; i++) {
            const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.04, 0.4),
                new THREE.MeshStandardMaterial({ color: 0x2d5a27 }));
            stem.position.set((Math.random() - 0.5) * 10, 0.2, (Math.random() - 0.5) * 10);
            const petal = new THREE.Mesh(new THREE.SphereGeometry(0.1, 5, 5),
                new THREE.MeshStandardMaterial({ color: new THREE.Color(`hsl(${Math.random() * 50 + 30}, 80%, 70%)`) }));
            petal.position.y = 0.3;
            stem.add(petal);
            flowerGroup.add(stem);
        }
        flowerGroup.visible = false;
        scene.add(flowerGroup);

        // ---------- ANIME CHARACTER (toon shading) ----------
        const character = new THREE.Group();
        // Materials (toon)
        const skinMat = new THREE.MeshToonMaterial({ color: 0xffddbb });
        const darkClothMat = new THREE.MeshToonMaterial({ color: 0x0a0a14 });
        const hairMat = new THREE.MeshToonMaterial({ color: 0x1a1a2e });
        const eyeMat = new THREE.MeshToonMaterial({ color: 0x000000 });
        const goldMat = new THREE.MeshToonMaterial({ color: 0xffd700 });

        // Body (ramping)
        const body = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.32, 1.2, 8), darkClothMat);
        body.position.y = 0.6;
        body.castShadow = body.receiveShadow = true;
        character.add(body);

        // Head (agak besar)
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), skinMat);
        head.position.y = 1.4;
        head.castShadow = head.receiveShadow = true;
        character.add(head);

        // Rambut (beberapa cone)
        const hairGroup = new THREE.Group();
        for (let i = 0; i < 8; i++) {
            const strand = new THREE.Mesh(new THREE.ConeGeometry(0.08, 0.4, 4), hairMat);
            strand.position.set(Math.sin(i * 0.8) * 0.25, 1.6, Math.cos(i * 0.8) * 0.2);
            strand.rotation.x = 0.3;
            hairGroup.add(strand);
        }
        character.add(hairGroup);

        // Mata (dua bola pipih)
        const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), eyeMat);
        leftEye.position.set(-0.15, 1.5, 0.3);
        character.add(leftEye);
        const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), eyeMat);
        rightEye.position.set(0.15, 1.5, 0.3);
        character.add(rightEye);

        // Jubah (plane besar di belakang)
        const cloakGeo = new THREE.PlaneGeometry(0.9, 1.9, 6, 10);
        const cloak = new THREE.Mesh(cloakGeo, darkClothMat);
        cloak.position.set(0, 0.8, -0.3);
        cloak.castShadow = cloak.receiveShadow = true;
        character.add(cloak);

        // Tangan
        const armGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.7);
        const leftArm = new THREE.Mesh(armGeo, skinMat);
        leftArm.position.set(-0.4, 1.0, 0);
        leftArm.rotation.z = 0.3;
        leftArm.castShadow = true;
        character.add(leftArm);
        const rightArm = new THREE.Mesh(armGeo, skinMat);
        rightArm.position.set(0.4, 1.0, 0);
        rightArm.rotation.z = -0.3;
        rightArm.castShadow = true;
        character.add(rightArm);

        character.position.set(0, 0.1, 5);
        scene.add(character);
        // Daftarkan karakter ke outline
        outlinePass.selectedObjects = [character];

        // ---------- AUDIO (sama seperti sebelumnya) ----------
        let audioCtx, masterGain, musicGain, windGain, stepsGain, birdsGain;
        let musicPlaying = false;
        let isMuted = false;

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new(window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.5;
            masterGain.connect(audioCtx.destination);
            musicGain = audioCtx.createGain();
            musicGain.gain.value = 0.2;
            musicGain.connect(masterGain);
            windGain = audioCtx.createGain();
            windGain.gain.value = 0.12;
            windGain.connect(masterGain);
            stepsGain = audioCtx.createGain();
            stepsGain.gain.value = 0.15;
            stepsGain.connect(masterGain);
            birdsGain = audioCtx.createGain();
            birdsGain.gain.value = 0.0;
            birdsGain.connect(masterGain);
            generateWind();
            playMusicLoop();
            startFootsteps();
        }

        function generateWind() {
            const bufferSize = 2 * audioCtx.sampleRate;
            const noise = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = noise.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const source = audioCtx.createBufferSource();
            source.buffer = noise;
            source.loop = true;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 350;
            source.connect(filter);
            filter.connect(windGain);
            source.start();
        }

        function playMusicLoop() {
            const notes = [261.63, 329.63, 392.00, 523.25];
            let i = 0;
            const loop = () => {
                if (!musicPlaying || isMuted) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = notes[i % notes.length];
                gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.7);
                osc.connect(gain);
                gain.connect(musicGain);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.7);
                i++;
                setTimeout(loop, 850);
            };
            loop();
        }

        function startFootsteps() {
            let step = false;
            setInterval(() => {
                if (!musicPlaying || isMuted) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.value = step ? 75 : 65;
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
                osc.connect(gain);
                gain.connect(stepsGain);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.12);
                step = !step;
            }, 550);
        }

        document.getElementById('play-music-btn').addEventListener('click', () => {
            if (!audioCtx) initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            musicPlaying = true;
            if (isMuted) {
                masterGain.gain.value = 0.5;
                isMuted = false;
                document.getElementById('mute-btn').textContent = '🔊 Mute';
            }
        });
        document.getElementById('pause-music-btn').addEventListener('click', () => { musicPlaying = false; });
        document.getElementById('mute-btn').addEventListener('click', () => {
            if (!audioCtx) return;
            isMuted = !isMuted;
            masterGain.gain.value = isMuted ? 0 : 0.5;
            document.getElementById('mute-btn').textContent = isMuted ? '🔇 Unmute' : '🔊 Mute';
        });

        // ---------- ANIMATION LOOP ----------
        function animateLoop() {
            const time = performance.now() * 0.001;
            // Rain fall
            const positions = rain.geometry.attributes.position.array;
            for (let i = 0; i < positions.length; i += 3) {
                positions[i + 1] -= 0.07;
                if (positions[i + 1] < -0.5) {
                    positions[i + 1] = 8;
                    positions[i] = (Math.random() - 0.5) * 22;
                    positions[i + 2] = (Math.random() - 0.5) * 18;
                }
            }
            rain.geometry.attributes.position.needsUpdate = true;
            // Cloak waving
            const pos = cloak.geometry.attributes.position.array;
            for (let i = 0; i < pos.length; i += 3) {
                const y = pos[i + 1];
                pos[i + 2] = Math.sin(time * 6 + y * 2.5) * 0.1;
            }
            cloak.geometry.attributes.position.needsUpdate = true;
            // Bird flight
            if (birdGroup.visible) {
                birdGroup.children.forEach((b, idx) => {
                    b.position.y += Math.sin(time * 4 + idx) * 0.004;
                    b.position.x += Math.cos(time * 3 + idx) * 0.006;
                });
            }
            composer.render();
            requestAnimationFrame(animateLoop);
        }
        animateLoop();

        // ---------- JOURNEY SEQUENCE (GSAP) ----------
        function startJourney() {
            const tl = gsap.timeline({ delay: 0.3 });
            // Phase darkness
            tl.to(character.position, { z: 1.5, duration: 7, ease: "none" }, 0);
            tl.to(camera.position, { z: 7, y: 3, duration: 7, ease: "power1.inOut" }, 0);
            tl.to(ambient, { intensity: 0.15, duration: 5 }, 0);
            tl.to(dirLight, { intensity: 0.1, duration: 5 }, 0);
            // Transition
            tl.to(character.position, { z: -2, duration: 9, ease: "power2.inOut" }, 7);
            tl.to(camera.position, { z: 4.5, y: 4, duration: 9, ease: "power2.inOut" }, 7);
            tl.to(ambient, { intensity: 0.9, duration: 7 }, 7);
            tl.to(dirLight, { intensity: 1.4, duration: 7 }, 7);
            tl.to(groundMat.color, { r: 0.25, g: 0.55, b: 0.2, duration: 7 }, 7);
            tl.to(scene.fog, { density: 0.00002, duration: 7 }, 7);
            tl.to(rain.material, { opacity: 0, duration: 5 }, 7);
            // Sun & rays
            tl.call(() => { sun.visible = true;
                rayGroup.visible = true; }, null, 12);
            tl.to(sun.position, { y: 5, z: -11, duration: 4 }, 12);
            tl.to(rayGroup.position, { y: 5, z: -11, duration: 4 }, 12);
            // Birds, flowers
            tl.call(() => { birdGroup.visible = true;
                flowerGroup.visible = true; }, null, 15);
            // Character transform
            tl.to([darkClothMat.color, cloak.material.color], { r: 0.95, g: 0.9, b: 0.75, duration: 3 }, 15);
            tl.to(hairMat.color, { r: 0.3, g: 0.2, b: 0.1, duration: 3 }, 15);
            // Ending
            tl.call(() => {
                document.getElementById('ending-message').classList.add('show');
                if (audioCtx && musicPlaying) birdsGain.gain.linearRampToValueAtTime(0.12, audioCtx.currentTime +
                    2);
            }, null, 17);
            tl.to({}, { duration: 2 });
        }

        document.getElementById('restart-btn').addEventListener('click', () => location.reload());
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
        window.addEventListener('click', () => { if (audioCtx?.state === 'suspended') audioCtx.resume(); }, { once:
                true });
    </script>
</body>
</html>
